services:
  postgres:
    image: postgres:16
    container_name: notification-postgres
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - notification-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  notification-pgdata:
