spring:
  application:
    name: notification-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification}
    username: ${SPRING_DATASOURCE_USERNAME:notification}
    password: ${SPRING_DATASOURCE_PASSWORD:notification}
    hikari:
      maximum-pool-size: 20   # ≥ worker.concurrency(16) + API 여유. 다중 인스턴스 시 인스턴스수×풀 ≤ PG max_connections
  jpa:
    hibernate:
      ddl-auto: none          # Flyway가 스키마를 소유
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# 알림 시스템 정책 (운영 중 조정 가능, ADR 00-DECISIONS 참고)
notification:
  scheduling-enabled: true   # 이 인스턴스가 백그라운드 스케줄 작업(Worker 폴링 + Sweeper)을 실행
  polling:
    interval: 5s
    batch-size: 50
  retry:
    max-attempts: 5
    initial-backoff: 1m
    multiplier: 2
    max-backoff: 16m
    jitter-max: 30s
  sender:
    timeout: 2m
  sweeper:
    interval: 1m
    lease-timeout: 10m    # ≥ ⌈batch/concurrency⌉ × sender-timeout + 마진 (⌈50/16⌉×2m=8m → 10m)
  worker:
    concurrency: 16       # 인스턴스당 발송 동시성(고정 풀). 중간 기준 + 낙관(~10) 여유
  retention:
    enabled: false
    sent-days: 30
    dead-letter-days: 90
  mock-sender:
    failure-rate: 0.0
