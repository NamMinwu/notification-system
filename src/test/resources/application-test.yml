# 테스트 프로파일: 타임아웃/주기를 짧게. 시간 의존 단위 테스트는 Clock 주입으로 결정적 검증.
spring:
  datasource:
    hikari:
      maximum-pool-size: 20   # 동시성 테스트(동일 알림 다수 동시 생성/읽음)에서 커넥션 고갈 방지
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

notification:
  scheduling-enabled: false   # 테스트는 runOnce()/sweep()를 직접 호출해 결정적으로 검증
  polling:
    interval: 1s
    batch-size: 50
  retry:
    max-attempts: 5
    initial-backoff: 1s
    multiplier: 2
    max-backoff: 8s
    jitter-max: 1s
  sender:
    timeout: 5s
  sweeper:
    interval: 1s
    lease-timeout: 10s
  retention:
    enabled: false
    sent-days: 30
    dead-letter-days: 90
  mock-sender:
    failure-rate: 0.0
